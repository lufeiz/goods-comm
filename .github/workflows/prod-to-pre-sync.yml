name: goods-comm prod-to-pre sync

on:
  workflow_dispatch:
    inputs:
      operation:
        description: Run mode
        required: true
        default: plan
        type: choice
        options:
          - plan
          - execute
      confirm_sync:
        description: Type sync-prod-to-pre to execute manual sync
        required: false
        default: ''
        type: string
      run_pre_smoke:
        description: Run deployed pre health smoke after successful sync
        required: true
        default: true
        type: boolean
      health_attempts:
        description: Pre health smoke retry attempts after sync
        required: true
        default: '12'
        type: string
      health_interval_ms:
        description: Pre health smoke retry interval in milliseconds after sync
        required: true
        default: '10000'
        type: string
      run_pre_main_smoke:
        description: Run deployed pre main-flow smoke after successful sync; requires smoke login codes and coordinates
        required: true
        default: false
        type: boolean
  schedule:
    - cron: '0 18 * * *'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: goods-comm-prod-to-pre-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      GOODS_COMM_SYNC_AUTO_ENABLED: ${{ vars.GOODS_COMM_SYNC_AUTO_ENABLED }}
      GOODS_COMM_SMOKE_API_BASE_URL: ${{ secrets.GOODS_COMM_SMOKE_API_BASE_URL }}
      GOODS_COMM_SMOKE_SELLER_CODE: ${{ secrets.GOODS_COMM_SMOKE_SELLER_CODE }}
      GOODS_COMM_SMOKE_SELLER_PROVIDER: ${{ secrets.GOODS_COMM_SMOKE_SELLER_PROVIDER }}
      GOODS_COMM_SMOKE_BUYER_CODE: ${{ secrets.GOODS_COMM_SMOKE_BUYER_CODE }}
      GOODS_COMM_SMOKE_BUYER_PROVIDER: ${{ secrets.GOODS_COMM_SMOKE_BUYER_PROVIDER }}
      GOODS_COMM_SMOKE_LATITUDE: ${{ secrets.GOODS_COMM_SMOKE_LATITUDE }}
      GOODS_COMM_SMOKE_LONGITUDE: ${{ secrets.GOODS_COMM_SMOKE_LONGITUDE }}
      GOODS_COMM_SMOKE_ACCURACY: ${{ secrets.GOODS_COMM_SMOKE_ACCURACY }}
      GOODS_COMM_SMOKE_CAPTURED_AT: ${{ secrets.GOODS_COMM_SMOKE_CAPTURED_AT }}
      GOODS_COMM_SMOKE_SCOPE_TYPE: ${{ secrets.GOODS_COMM_SMOKE_SCOPE_TYPE }}
      GOODS_COMM_SMOKE_RADIUS_METERS: ${{ secrets.GOODS_COMM_SMOKE_RADIUS_METERS }}
      GOODS_COMM_SMOKE_RUN_ID: ${{ secrets.GOODS_COMM_SMOKE_RUN_ID }}
      GOODS_COMM_SMOKE_APPROVED_IMAGE_URL: ${{ secrets.GOODS_COMM_SMOKE_APPROVED_IMAGE_URL }}
      GOODS_COMM_SMOKE_APPROVED_IMAGE_STORAGE_KEY: ${{ secrets.GOODS_COMM_SMOKE_APPROVED_IMAGE_STORAGE_KEY }}
      GOODS_COMM_SMOKE_APPROVED_IMAGE_SIZE: ${{ secrets.GOODS_COMM_SMOKE_APPROVED_IMAGE_SIZE }}
      GOODS_COMM_SMOKE_APPROVED_IMAGE_MIME_TYPE: ${{ secrets.GOODS_COMM_SMOKE_APPROVED_IMAGE_MIME_TYPE }}
      GOODS_COMM_SMOKE_APPROVED_IMAGE_CHECKSUM: ${{ secrets.GOODS_COMM_SMOKE_APPROVED_IMAGE_CHECKSUM }}
      GOODS_COMM_SMOKE_ACCOUNT_DELETE_PROVIDER: ${{ secrets.GOODS_COMM_SMOKE_ACCOUNT_DELETE_PROVIDER }}
      GOODS_COMM_SMOKE_ACCOUNT_DELETE_CODE: ${{ secrets.GOODS_COMM_SMOKE_ACCOUNT_DELETE_CODE }}
      GOODS_COMM_SMOKE_ACCOUNT_DELETE_RELOGIN_CODE: ${{ secrets.GOODS_COMM_SMOKE_ACCOUNT_DELETE_RELOGIN_CODE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Materialize protected env overrides
        shell: bash
        env:
          GOODS_COMM_PRE_ENV_LOCAL: ${{ secrets.GOODS_COMM_PRE_ENV_LOCAL }}
          GOODS_COMM_PROD_ENV_LOCAL: ${{ secrets.GOODS_COMM_PROD_ENV_LOCAL }}
        run: |
          if [ -n "${GOODS_COMM_PRE_ENV_LOCAL}" ]; then
            printf "%s\n" "${GOODS_COMM_PRE_ENV_LOCAL}" > .env.pre.local
          fi
          if [ -n "${GOODS_COMM_PROD_ENV_LOCAL}" ]; then
            printf "%s\n" "${GOODS_COMM_PROD_ENV_LOCAL}" > .env.prod.local
          fi

      - name: Materialize deployed smoke inputs
        shell: bash
        env:
          GOODS_COMM_PRE_SMOKE_ENV_LOCAL: ${{ secrets.GOODS_COMM_PRE_SMOKE_ENV_LOCAL }}
        run: |
          if [ -n "${GOODS_COMM_PRE_SMOKE_ENV_LOCAL}" ]; then
            printf "%s\n" "${GOODS_COMM_PRE_SMOKE_ENV_LOCAL}" > .env.smoke.pre.local
          fi

      - name: Print sync plan
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.operation == 'plan' }}
        env:
          GOODS_COMM_SYNC_DUMP_PATH: ${{ runner.temp }}/goods-comm-prod-to-pre.dump
          GOODS_COMM_SYNC_LOCK_PATH: ${{ runner.temp }}/goods-comm-prod-to-pre.lock
          GOODS_COMM_SYNC_AUDIT_PATH: ${{ runner.temp }}/goods-comm-prod-to-pre-audit.jsonl
          GOODS_COMM_SYNC_RUN_PRE_SMOKE: ${{ github.event.inputs.run_pre_smoke }}
          GOODS_COMM_SYNC_HEALTH_ATTEMPTS: ${{ github.event.inputs.health_attempts }}
          GOODS_COMM_SYNC_HEALTH_INTERVAL_MS: ${{ github.event.inputs.health_interval_ms }}
          GOODS_COMM_SYNC_RUN_PRE_MAIN_SMOKE: ${{ github.event.inputs.run_pre_main_smoke }}
        run: npm run sync:prod-to-pre:plan

      - name: Execute manual sync
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.operation == 'execute' }}
        env:
          GOODS_COMM_SYNC_DUMP_PATH: ${{ runner.temp }}/goods-comm-prod-to-pre.dump
          GOODS_COMM_SYNC_LOCK_PATH: ${{ runner.temp }}/goods-comm-prod-to-pre.lock
          GOODS_COMM_SYNC_AUDIT_PATH: ${{ runner.temp }}/goods-comm-prod-to-pre-audit.jsonl
          GOODS_COMM_SYNC_RUN_PRE_SMOKE: ${{ github.event.inputs.run_pre_smoke }}
          GOODS_COMM_SYNC_HEALTH_ATTEMPTS: ${{ github.event.inputs.health_attempts }}
          GOODS_COMM_SYNC_HEALTH_INTERVAL_MS: ${{ github.event.inputs.health_interval_ms }}
          GOODS_COMM_SYNC_RUN_PRE_MAIN_SMOKE: ${{ github.event.inputs.run_pre_main_smoke }}
          GOODS_COMM_SYNC_CONFIRM: ${{ github.event.inputs.confirm_sync }}
        run: npm run sync:prod-to-pre

      - name: Execute scheduled auto sync
        if: ${{ github.event_name == 'schedule' && vars.GOODS_COMM_SYNC_AUTO_ENABLED == 'true' }}
        env:
          GOODS_COMM_SYNC_DUMP_PATH: ${{ runner.temp }}/goods-comm-prod-to-pre.dump
          GOODS_COMM_SYNC_LOCK_PATH: ${{ runner.temp }}/goods-comm-prod-to-pre.lock
          GOODS_COMM_SYNC_AUDIT_PATH: ${{ runner.temp }}/goods-comm-prod-to-pre-audit.jsonl
          GOODS_COMM_SYNC_RUN_PRE_SMOKE: 'true'
          GOODS_COMM_SYNC_HEALTH_ATTEMPTS: ${{ vars.GOODS_COMM_SYNC_HEALTH_ATTEMPTS || '12' }}
          GOODS_COMM_SYNC_HEALTH_INTERVAL_MS: ${{ vars.GOODS_COMM_SYNC_HEALTH_INTERVAL_MS || '10000' }}
          GOODS_COMM_SYNC_RUN_PRE_MAIN_SMOKE: ${{ vars.GOODS_COMM_SYNC_RUN_PRE_MAIN_SMOKE == 'true' && 'true' || 'false' }}
        run: npm run sync:prod-to-pre:auto

      - name: Skip disabled scheduled sync
        if: ${{ github.event_name == 'schedule' && vars.GOODS_COMM_SYNC_AUTO_ENABLED != 'true' }}
        run: echo "Scheduled prod-to-pre sync skipped because repository variable GOODS_COMM_SYNC_AUTO_ENABLED is not true."

      - name: Upload sync audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prod-to-pre-sync-audit
          path: ${{ runner.temp }}/goods-comm-prod-to-pre-audit.jsonl
          if-no-files-found: ignore
